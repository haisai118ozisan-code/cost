<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="価格比較">
<title>価格比較</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:#e8e6de;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;padding-bottom:70px;font-size:13px}

/* ヘッダー */
.header{background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 100%);padding:8px 10px 6px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #00000066}
.header h1{color:#fff;font-size:15px;font-weight:800}
.header .sub{color:#7ec8e3;font-size:10px;margin-left:6px}
.btn-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;align-items:center}
.btn{border-radius:12px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid;background:transparent;-webkit-appearance:none}
.btn-green {color:#2ecc71;border-color:#2ecc71}
.btn-orange{color:#ff9500;border-color:#ff9500}
.btn-blue  {color:#5aaaff;border-color:#5aaaff}
.btn-yellow{color:#f0c040;border-color:#f0c040}
.btn-teal  {color:#7ec8e3;border-color:#7ec8e3}
.btn-red   {color:#ff5555;border-color:#ff5555}
.btn-purple{color:#cc88ff;border-color:#cc88ff}
.btn:disabled{opacity:0.35}
.save-msg{color:#2ecc71;font-size:10px;font-weight:700;align-self:center}

/* スクリーンタブ */
.screen-tabs{display:flex;background:#0a0a1a;border-bottom:1px solid #2a2a4a}
.screen-tab{flex:1;padding:7px 0;text-align:center;font-size:11px;font-weight:700;color:#555;cursor:pointer;border-bottom:2.5px solid transparent;transition:all 0.15s}
.screen-tab.active{color:#7ec8e3;border-color:#7ec8e3;background:#12122a}

/* 商品カテゴリタブ */
.cat-tab-wrap{background:#fff;border-bottom:2px solid #d0cfc8;padding:6px 8px 0;position:sticky;top:56px;z-index:90;box-shadow:0 1px 4px #00000022}
.cat-tab-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.cat-tab-scroll::-webkit-scrollbar{display:none}
.cat-tab{background:#e8e6de;color:#555;border:1.5px solid #ccc;border-radius:14px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.cat-tab.active{background:#1a1a3e;color:#fff;border-color:#1a1a3e}
.cat-tab-edit{display:flex;gap:5px;align-items:center;padding:4px 0 2px;margin-top:3px}
.cat-tab-edit input{flex:1;border:1.5px solid #4a90e2;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;background:#f8f8ff}

/* メインエリア */
.main-area{padding:10px 8px 0}

/* 店カード — コントラスト強化 */
.shop-card{border-radius:12px;padding:10px 10px 8px;margin-bottom:10px;border:2px solid}
.shop-card:nth-child(odd) {background:#ffffff;border-color:#c8c6be}
.shop-card:nth-child(even){background:#f0ede4;border-color:#b8b4aa}
.shop-card.best{background:#d0f5e4!important;border-color:#2ecc71!important}

.shop-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.shop-num{width:22px;height:22px;border-radius:50%;background:#c0beb6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}
.shop-num.best{background:#2ecc71}
.shop-name-label{font-size:13px;font-weight:800;color:#222;margin-left:6px;flex:1}
.shop-card.best .shop-name-label{color:#0a6630}
.best-badge{background:#2ecc71;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:7px}
.action-mini{display:flex;gap:4px}
.act-btn{background:#1a1a3e;color:#ffaa55;border:1.5px solid #ff9500;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.act-btn.hist{background:#1a0a3e;color:#cc88ff;border-color:#cc88ff}

.name-inp{width:100%;border:1.5px solid #ccc;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;outline:none;margin-bottom:5px;color:#333}
.shop-card.best .name-inp{border-color:#a0ddb8}
.field-row{display:flex;gap:5px;align-items:center}
.field{flex:1}
.field input{width:100%;border:1.5px solid #ccc;border-radius:6px;padding:5px 8px;font-size:13px;background:#fff;outline:none;color:#222;-webkit-appearance:none}
.shop-card.best .field input{border-color:#a0ddb8}
.field-suffix{font-size:10px;color:#888;font-weight:700;padding:0 2px}
.unit-result{display:flex;align-items:center;justify-content:space-between;margin-top:5px;padding:4px 8px;background:#e8e6de;border-radius:6px}
.shop-card:nth-child(even) .unit-result{background:#dedad0}
.shop-card.best .unit-result{background:#a8eac8}
.unit-label{font-size:9px;color:#888}
.unit-val{font-size:14px;font-weight:800;color:#444}
.shop-card.best .unit-val{color:#0a6630}

/* カテゴリ別サマリー */
.cat-summary{background:#1a1a3e;border-radius:10px;margin:0 0 10px;padding:8px 10px}
.cat-sum-title{color:#7ec8e3;font-size:10px;font-weight:700;margin-bottom:5px}
.cat-sum-row{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#0f0f28;border:1px solid #2a2a4a;border-radius:6px;margin-bottom:3px}
.cat-sum-row.best{background:#0a3020;border-color:#2ecc71}
.cat-sum-row:last-child{margin-bottom:0}
.cat-sum-name{font-weight:700;font-size:11px;color:#bbb}
.cat-sum-row.best .cat-sum-name{color:#2ecc71}
.cat-sum-val{font-weight:800;font-size:12px;color:#f0a500}
.cat-sum-row.best .cat-sum-val{color:#2ecc71}

/* 店別合計画面 */
.total-screen{padding:8px 8px 0}
.total-title{font-size:13px;font-weight:800;color:#1a1a3e;margin-bottom:8px;padding:6px 10px;background:#fff;border-radius:8px;border-left:4px solid #4a90e2}
.total-card{border-radius:12px;padding:10px 12px;margin-bottom:8px;border:2px solid}
.total-card:nth-child(odd) {background:#ffffff;border-color:#c8c6be}
.total-card:nth-child(even){background:#f0ede4;border-color:#b8b4aa}
.total-card.best{background:#d0f5e4!important;border-color:#2ecc71!important}
.total-shop-name{font-size:14px;font-weight:800;color:#222;margin-bottom:6px}
.total-card.best .total-shop-name{color:#0a6630}
.total-items{font-size:10px;color:#777;margin-bottom:6px;line-height:1.6}
.total-amount{display:flex;align-items:baseline;gap:4px}
.total-amount-val{font-size:22px;font-weight:800;color:#1a1a3e}
.total-card.best .total-amount-val{color:#0a6630}
.total-amount-unit{font-size:11px;color:#888;font-weight:700}
.total-coverage{font-size:10px;color:#aaa;margin-top:2px}
.total-empty{text-align:center;color:#bbb;font-size:12px;padding:20px 0}
.total-note{background:#fff8eb;border-left:3px solid #ff9500;border-radius:4px;padding:7px 10px;font-size:10px;color:#aa6600;margin-bottom:10px;line-height:1.5}

/* 履歴・設定画面 */
#screen-history,#screen-settings,#screen-total{display:none}
.history-screen,.settings-screen{padding:8px 8px 0}
.history-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.hf-btn{background:#e8e6de;color:#555;border:1.5px solid #ccc;border-radius:12px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer}
.hf-btn.active{background:#1a1a3e;color:#7ec8e3;border-color:#1a1a3e}
.history-empty{text-align:center;color:#bbb;font-size:11px;padding:20px 0}
.hist-card{background:#fff;border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;margin-bottom:5px;display:flex;align-items:center;gap:7px;cursor:pointer}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:12px;font-weight:700;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-meta{font-size:9px;color:#888;margin-top:1px}
.hist-del{background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;flex-shrink:0}
.hist-weight{font-size:11px;font-weight:700;color:#2ecc71;flex-shrink:0}

/* 設定 */
.settings-card{background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px}
.settings-title{font-size:12px;font-weight:800;color:#333;margin-bottom:6px}
.settings-sub{font-size:10px;color:#888;margin-bottom:8px;line-height:1.5}
.api-key-input{width:100%;border:1.5px solid #ddd;border-radius:6px;padding:8px 10px;font-size:11px;font-family:monospace;background:#f8f8f5;outline:none;color:#333}
.api-key-status{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;margin-top:6px}
.api-key-status.ok{background:#d4f5e2;color:#16a05a}
.api-key-status.ng{background:#ffd4d4;color:#cc4444}
.api-cost{background:#fff8eb;border-left:3px solid #ff9500;padding:6px 10px;font-size:10px;color:#aa6600;margin-top:8px;border-radius:4px;line-height:1.5}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:14px 14px 0 0;padding:14px 12px 28px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:13px;font-weight:700;color:#333;margin-bottom:3px;text-align:center}
.modal-sub{font-size:10px;color:#999;text-align:center;margin-bottom:10px}
.modal-btn{display:block;width:100%;padding:11px;font-size:13px;font-weight:700;border:none;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#f0f0ec;color:#333;-webkit-appearance:none}
.modal-btn.primary{background:#1a1a3e;color:#7ec8e3}
.modal-btn.cancel{background:#ebebeb;color:#999}
.confirm-fields{display:flex;gap:6px;margin-bottom:10px}
.confirm-fields .field input{padding:8px 10px;font-size:14px}
.confirm-fields .field label{font-size:10px;color:#aaa;font-weight:600;display:block;margin-bottom:2px}

/* OCR */
.ocr-modal{position:fixed;inset:0;background:#fff;z-index:350;display:flex;flex-direction:column}
.ocr-header{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;background:#1a1a3e;flex-shrink:0}
.ocr-header span{color:#fff;font-size:13px;font-weight:700}
.ocr-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
.ocr-body{flex:1;overflow-y:auto;padding:10px}
.ocr-step{background:#f8f8f5;border-radius:8px;padding:10px;margin-bottom:8px}
.ocr-step-title{font-size:12px;font-weight:800;color:#333;margin-bottom:4px}
.ocr-pick{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ocr-pick button{padding:10px;border:2px solid #4a90e2;border-radius:8px;background:#fff;color:#4a90e2;font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;-webkit-appearance:none}
.ocr-pick button .ic{font-size:20px}
.ocr-img-prev{width:100%;max-height:200px;object-fit:contain;background:#ebebeb;border-radius:7px;margin-bottom:4px}
.ocr-progress{background:#fff8eb;border:1px solid #ff9500;border-radius:7px;padding:9px;margin-bottom:7px}
.ocr-progress-label{font-size:11px;font-weight:700;color:#cc7700;margin-bottom:4px}
.ocr-bar{background:#ffe0a0;height:5px;border-radius:3px;overflow:hidden}
.ocr-bar-fill{background:#ff9500;height:100%;width:0%;transition:width 0.3s}
.ocr-result{background:#edfaf3;border:1px solid #2ecc71;border-radius:7px;padding:9px;margin-bottom:7px}
.ocr-result-title{font-size:11px;font-weight:700;color:#16a05a}
.ocr-extract{background:#fff;border:1px solid #ddd;border-radius:7px;padding:9px}
.ocr-extract-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.ocr-extract-row:last-child{border-bottom:none}
.ocr-extract-label{font-size:11px;color:#888;font-weight:700;width:50px;flex-shrink:0}
.ocr-extract-row input{flex:1;border:1.5px solid #ddd;border-radius:5px;padding:6px 8px;font-size:13px;outline:none}
.ocr-result-text{background:#fff;border:1px solid #c0e8d0;border-radius:4px;padding:6px;font-size:9px;color:#555;max-height:80px;overflow-y:auto;white-space:pre-wrap;font-family:monospace}
.ocr-tips{background:#fff3e0;border-left:3px solid #ff9500;border-radius:4px;padding:8px 10px;margin-bottom:8px;font-size:10px;color:#aa6600;line-height:1.5}
.ocr-tips b{color:#cc4400}
.ocr-error{background:#ffe0e0;border:1px solid #cc4444;border-radius:7px;padding:9px;font-size:11px;color:#cc4444;font-weight:700}

.footer{text-align:center;color:#bbb;font-size:9px;margin:10px 0}
#file-ocr-cam,#file-ocr-lib{display:none}
canvas#cc{display:none}
</style>
</head>
<body>

<div class="header">
  <h1>💴 価格比較</h1><span class="sub">🚀 Google Vision API</span>
  <div class="btn-row" id="btn-row"></div>
</div>

<div class="screen-tabs">
  <div class="screen-tab active" id="tab-compare"  onclick="switchScreen('compare')">📊 比較</div>
  <div class="screen-tab"        id="tab-total"    onclick="switchScreen('total')">🏪 店別合計</div>
  <div class="screen-tab"        id="tab-history"  onclick="switchScreen('history')">🕘 履歴</div>
  <div class="screen-tab"        id="tab-settings" onclick="switchScreen('settings')">⚙️ 設定</div>
</div>

<!-- 比較画面 -->
<div id="screen-compare">
  <div class="cat-tab-wrap">
    <div class="cat-tab-scroll" id="cat-tabs"></div>
    <div id="cat-tab-edit"></div>
  </div>
  <div class="main-area">
    <div id="shop-rows"></div>
    <div id="cat-summary"></div>
  </div>
  <p class="footer">💾 端末保存 / 🚀 Google Cloud Vision API</p>
</div>

<!-- 店別合計画面 -->
<div id="screen-total">
  <div class="total-screen" id="total-screen"></div>
</div>

<!-- 履歴画面 -->
<div id="screen-history">
  <div class="history-screen">
    <div class="btn-row" style="margin-bottom:6px">
      <button class="btn btn-red" onclick="clearHistory()">🗑 履歴全削除</button>
    </div>
    <div class="history-filter" id="history-filter"></div>
    <div id="history-list"></div>
  </div>
</div>

<!-- 設定画面 -->
<div id="screen-settings">
  <div class="settings-screen">
    <div class="settings-card">
      <div class="settings-title">🔑 Google Cloud Vision API キー</div>
      <div class="settings-sub">APIキーを入力すると高精度OCRが使えます。<br>キーはこの端末のブラウザにのみ保存されます。</div>
      <input type="text" class="api-key-input" id="api-key-input" placeholder="AIzaSy... で始まるキー" autocomplete="off">
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn-green" onclick="saveApiKey()">💾 保存</button>
        <button class="btn btn-blue"  onclick="testApiKey()">🧪 接続テスト</button>
        <button class="btn btn-red"   onclick="clearApiKey()">🗑 削除</button>
      </div>
      <div id="api-key-status"></div>
      <div class="api-cost">💰 <b>料金：</b>月1,000枚まで無料 / 超過分1,000枚あたり $1.50（約230円）</div>
    </div>
  </div>
</div>

<!-- OCRモーダル -->
<div class="ocr-modal" id="ocr-modal" style="display:none">
  <div class="ocr-header">
    <span>🚀 Google Vision OCR</span>
    <button class="ocr-close" onclick="closeOCR()">✕</button>
  </div>
  <div class="ocr-body" id="ocr-body"></div>
</div>

<!-- 履歴適用モーダル -->
<div class="modal-overlay" id="hist-apply-modal" style="display:none">
  <div class="modal-sheet">
    <div class="modal-title">🕘 履歴から貼り付け</div>
    <div class="modal-sub" id="hist-apply-sub"></div>
    <input type="text" id="ha-name" class="name-inp" placeholder="商品名">
    <div class="confirm-fields">
      <div class="field"><label>価格（円）</label><input type="number" inputmode="decimal" id="ha-price" placeholder="0"></div>
      <div class="field"><label>内容量（g）</label><input type="number" inputmode="decimal" id="ha-weight" placeholder="0"></div>
    </div>
    <button class="modal-btn primary" onclick="applyHistItem()">✅ 登録</button>
    <button class="modal-btn cancel"  onclick="closeHistApplyModal()">キャンセル</button>
  </div>
</div>

<div class="modal-overlay" id="shop-edit-modal" style="display:none">
  <div class="modal-sheet">
    <div class="modal-title">✏️ 店舗名を編集</div>
    <input type="text" id="shop-edit-input" class="name-inp" placeholder="店舗名" style="font-size:16px;padding:10px;margin-bottom:12px">
    <button class="modal-btn primary" onclick="applyShopEdit()">✅ 確定</button>
    <button class="modal-btn cancel"  onclick="closeShopEdit()">キャンセル</button>
  </div>
</div>

<input type="file" id="file-ocr-cam" accept="image/*" capture="environment">
<input type="file" id="file-ocr-lib" accept="image/*">
<canvas id="cc"></canvas>

<script>
const SK="price_cmp_v15", HSK="price_hist_v1", API_SK="vision_api_key_v1";
const DRIVE_FILE="価格比較データ.json";
const SCOPES="https://www.googleapis.com/auth/drive.file";
const CLIENT_ID="910592498421-qu263dcmn8a8r4gq5t4qpqqshnfojvna.apps.googleusercontent.com";

// データ構造:
// categories: [{id, label}]
// shops:      [{id, label}]
// entries:    {catId: {shopId: {name, price, weight, count}}}

let categories=[], shops=[], entries={};
let activeCatId=null, editingCatId=null;
let history=[], histFilter="all", pendingHistApply=null;
let pendingOCR=null;
let ocrPhotoDataUrl=null, ocrPhotoDataUrlPrice=null, ocrCurrentStep="select";
let apiKey="", saveTimer=null;
let isDirty=false; // 未保存フラグ
let googleUser=null, accessToken=null, driveFileId=null, tokenTimer=null;

const uid=()=>Math.random().toString(36).slice(2,8);
const per100=(p,w)=>{p=parseFloat(p);w=parseFloat(w);return(p&&w&&w>0)?(p/w)*100:null};
const perItem=(p,c)=>{p=parseFloat(p);c=parseFloat(c);return(p&&c&&c>0)?p/c:null};

function emptyEntry(){return{name:"",price:"",weight:"",count:""}}

function initData(){
  categories=[{id:uid(),label:"もやし"},{id:uid(),label:"豆腐"},{id:uid(),label:"鶏肉"}];
  shops=[{id:uid(),label:"店舗A"},{id:uid(),label:"店舗B"},{id:uid(),label:"店舗C"}];
  entries={};
  categories.forEach(c=>{entries[c.id]={};shops.forEach(s=>{entries[c.id][s.id]=emptyEntry()})});
  activeCatId=categories[0].id;
}

function syncEntries(){
  categories.forEach(c=>{
    if(!entries[c.id])entries[c.id]={};
    shops.forEach(s=>{if(!entries[c.id][s.id])entries[c.id][s.id]=emptyEntry()});
    Object.keys(entries[c.id]).forEach(k=>{if(!shops.find(s=>s.id===k))delete entries[c.id][k]});
  });
  Object.keys(entries).forEach(k=>{if(!categories.find(c=>c.id===k))delete entries[k]});
}

function loadData(){
  try{
    const d=JSON.parse(localStorage.getItem(SK));
    if(d?.categories&&d?.shops&&d?.entries){
      categories=d.categories;shops=d.shops;entries=d.entries;
      activeCatId=categories[0]?.id||null;return;
    }
  }catch{}
  initData();
}

// ===== Google Drive連携 =====
function initGoogleAuth(){
  window.onGoogleLibraryLoad=()=>{
    try{
      const saved=localStorage.getItem("pc_google_user");
      if(saved){googleUser=JSON.parse(saved);renderDriveStatus();refreshDriveToken();}
    }catch(e){}
  };
}
function googleLoginForDrive(){
  try{
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:(tr)=>{
        if(tr.error)return;
        accessToken=tr.access_token;
        clearTimeout(tokenTimer);tokenTimer=setTimeout(refreshDriveToken,55*60*1000);
        renderDriveStatus();showMsg("☁️ Drive連携済み");
      }
    });
    tc.requestAccessToken({prompt:""});
  }catch(e){alert("Googleログインに失敗しました。\nページを再読み込みしてください。")}
}
function refreshDriveToken(){
  try{
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,scope:SCOPES,
      callback:(tr)=>{if(!tr.error){accessToken=tr.access_token;clearTimeout(tokenTimer);tokenTimer=setTimeout(refreshDriveToken,55*60*1000);}}
    });
    tc.requestAccessToken({prompt:""});
  }catch(e){}
}
function googleLogoutDrive(){
  googleUser=null;accessToken=null;driveFileId=null;
  clearTimeout(tokenTimer);localStorage.removeItem("pc_google_user");
  renderDriveStatus();showMsg("Drive切断");
}
function renderDriveStatus(){

function compressImage(file,maxW=1800,maxH=1800,q=0.92){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      const r=Math.min(maxW/w,maxH/h,1);w=Math.round(w*r);h=Math.round(h*r);
      const cv=document.getElementById("cc");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      res(cv.toDataURL("image/jpeg",q));
    };
    img.src=url;
  });
}

async function callVisionAPI(dataUrl){
  const base64=dataUrl.split(",")[1];
  const res=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({requests:[{
      image:{content:base64},
      features:[{type:"TEXT_DETECTION",maxResults:1},{type:"DOCUMENT_TEXT_DETECTION",maxResults:1}],
      imageContext:{languageHints:["ja","en"]}
    }]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const r=data.responses?.[0];
  if(r?.error)throw new Error(r.error.message);
  return r?.fullTextAnnotation?.text||r?.textAnnotations?.[0]?.description||"";
}
async function runOCR(){
  ocrCurrentStep="analyzing";renderOCRBody();
  try{
    let combinedText="",nameText="",priceText="";
    if(ocrPhotoDataUrl){
      document.getElementById("ocr-progress-label").textContent="📦 商品写真を解析中...";
      nameText=await callVisionAPI(ocrPhotoDataUrl);combinedText+=nameText+"\n";
    }
    if(ocrPhotoDataUrlPrice){
      document.getElementById("ocr-progress-label").textContent="💰 値札写真を解析中...";
      priceText=await callVisionAPI(ocrPhotoDataUrlPrice);combinedText+=priceText;
    }
    const extracted=extractInfoFromText(combinedText,nameText,priceText);
    window._ocrExtracted={...extracted,rawText:combinedText};
    ocrCurrentStep="result";renderOCRBody();
  }catch(e){window._ocrError=e.message;ocrCurrentStep="error";renderOCRBody()}
}
function extractInfoFromText(allText,nameText,priceText){
  const N=s=>s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[Ｇｇ]/g,"g").replace(/[，、]/g,",").replace(/[．。]/g,".").replace(/[¥￥]/g,"¥");
  const allN=N(allText),priceN=N(priceText||allText),nameN=N(nameText||allText);
  let priceCandidates=[];
  const pPats=[/[¥\\]\s*([0-9]{1,3}(?:,[0-9]{3})*|[0-9]+)/g,/([0-9]{1,3}(?:,[0-9]{3})*|[0-9]+)\s*円/g,/税込[\s:：]*([0-9]+)/g,/税抜[\s:：]*([0-9]+)/g];
  for(const p of pPats){let m;while((m=p.exec(priceN))!==null){const n=parseInt(m[1].replace(/,/g,""));if(n>=10&&n<=1000000)priceCandidates.push(n)}}
  if(!priceCandidates.length){(priceN.match(/\b([0-9]{2,5})\b/g)||[]).forEach(n=>{const v=parseInt(n);if(v>=50&&v<=50000)priceCandidates.push(v)})}
  const price=priceCandidates.length?Math.max(...priceCandidates):"";
  let weight="";
  const wPats=[/([0-9]+(?:\.[0-9]+)?)\s*g\b/,/([0-9]+(?:\.[0-9]+)?)\s*グラム/,/内容量[\s:：]*([0-9]+(?:\.[0-9]+)?)\s*g/,/([0-9]+(?:\.[0-9]+)?)\s*kg/i];
  for(const p of wPats){const m=p.exec(allN);if(m){let n=parseFloat(m[1]);if(/kg/i.test(p.source))n*=1000;if(n>=1&&n<=10000){weight=n;break}}}
  let name="";
  const lines=nameN.split(/\r?\n/).map(l=>l.trim()).filter(l=>{
    if(l.length<2||l.length>40)return false;
    if((l.replace(/[0-9¥円\s\.,gG・\/\\\-_:：mlkg]/g,"")).length<2)return false;
    if(/賞味|消費|期限|製造|販売|JAN|エネルギー|たんぱく|脂質|炭水化物/.test(l))return false;
    return true;
  });
  if(lines.length){
    const sorted=lines.slice().sort((a,b)=>(b.match(/[ぁ-んァ-ヶ一-龯]/g)||[]).length-(a.match(/[ぁ-んァ-ヶ一-龯]/g)||[]).length);
    name=sorted[0].replace(/[\s　]+/g," ").trim().substring(0,30);
  }
  return{name,price,weight};
}

function renderTotalScreen(){
  const el=document.getElementById("total-screen");
  // 各店舗の合計金額を計算
  const shopTotals=shops.map(shop=>{
    let total=0,covered=0,missing=[];
    categories.forEach(cat=>{
      const e=entries[cat.id]?.[shop.id];
      const p=parseFloat(e?.price);
      if(p&&p>0){total+=p;covered++}
      else missing.push(cat.label);
    });
    return{shop,total,covered,missing,all:categories.length};
  }).filter(t=>t.covered>0).sort((a,b)=>a.total-b.total);

  if(!shopTotals.length){
    el.innerHTML='<div class="total-empty">価格を入力するとここに店別合計が表示されます</div>';return;
  }

  const minTotal=shopTotals[0].total;

  el.innerHTML=`
    <div class="total-title">🏪 店別 合計金額比較</div>
    <div class="total-note">⚠️ 全カテゴリに価格が入力されている店のみ正確に比較できます。未入力は合計から除外されます。</div>
    ${shopTotals.map((t,i)=>{
      const isBest=Math.abs(t.total-minTotal)<0.01;
      const diff=i>0?`+${(t.total-minTotal).toFixed(0)}円`:"";
      return`<div class="total-card ${isBest?"best":""}">
        <div class="total-shop-name">${isBest?"★ ":""}${t.shop.label}${diff?` <span style="font-size:11px;color:#cc4444">(${diff})</span>`:""}</div>
        <div class="total-items">${categories.map(cat=>{
          const e=entries[cat.id]?.[t.shop.id];
          const p=parseFloat(e?.price);
          return p&&p>0?`${cat.label}：${p}円`:`${cat.label}：<span style="color:#cc8800">未入力</span>`;
        }).join("　")}</div>
        <div class="total-amount">
          <span class="total-amount-val">${t.total.toLocaleString()}</span>
          <span class="total-amount-unit">円</span>
        </div>
        <div class="total-coverage">${t.covered}/${t.all}カテゴリ入力済み${t.missing.length?` ／ 未入力：${t.missing.join("・")}`:" ✓全入力"}</div>
      </div>`;
    }).join("")}`;
}

// ===== 描画 =====
function recompute(){
  if(!activeCatId)return;
  const catEntries=entries[activeCatId]||{};
  // 100gあたり単価（gあり）と1個あたり単価（個数あり）を両方計算
  const vals100=shops.map(s=>per100(catEntries[s.id]?.price,catEntries[s.id]?.weight));
  const valsItem=shops.map(s=>perItem(catEntries[s.id]?.price,catEntries[s.id]?.count));
  // 比較はg優先、なければ個数
  const valsComp=shops.map((s,i)=>vals100[i]!==null?vals100[i]:valsItem[i]);
  const valid=valsComp.filter(v=>v!==null);
  const minVal=valid.length>=2?Math.min(...valid):null;

  shops.forEach((shop,i)=>{
    const v=valsComp[i];const isBest=v!==null&&minVal!==null&&Math.abs(v-minVal)<0.001&&valid.length>=2;
    const card=document.getElementById(`sc_${shop.id}`);
    if(card)card.className=card.className.replace(" best","")+(isBest?" best":"");
    const num=document.getElementById(`snum_${shop.id}`);if(num)num.className="shop-num"+(isBest?" best":"");
    const badge=document.getElementById(`sbadge_${shop.id}`);if(badge)badge.style.display=isBest?"inline-block":"none";
    // 単価表示エリア
    const urWrap=document.getElementById(`ur_${shop.id}`);
    const ur100=document.getElementById(`ur100_${shop.id}`);
    const urItem=document.getElementById(`urItem_${shop.id}`);
    const uv100=document.getElementById(`uv100_${shop.id}`);
    const uvItem=document.getElementById(`uvItem_${shop.id}`);
    const has100=vals100[i]!==null;
    const hasItem=valsItem[i]!==null;
    if(urWrap)urWrap.style.display=(has100||hasItem)?"flex":"none";
    if(ur100)ur100.style.display=has100?"flex":"none";
    if(urItem)urItem.style.display=hasItem?"flex":"none";
    if(uv100&&has100)uv100.textContent=vals100[i].toFixed(1)+"円"+(isBest&&!hasItem?" ✓":"");
    if(uvItem&&hasItem)uvItem.textContent=valsItem[i].toFixed(1)+"円"+(isBest?" ✓":"");
  });

  // カテゴリサマリー（g優先・なければ個数）
  const avgs=shops.map(shop=>{
    const vs=categories.map(cat=>{
      const e=entries[cat.id]?.[shop.id];
      const v100=per100(e?.price,e?.weight);
      const vIt=perItem(e?.price,e?.count);
      return v100!==null?v100:vIt;
    }).filter(v=>v!==null);
    return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null;
  });
  const va=avgs.filter(v=>v!==null);const minA=va.length>=2?Math.min(...va):null;
  shops.forEach((shop,i)=>{
    const avg=avgs[i];const isBest=avg!==null&&minA!==null&&Math.abs(avg-minA)<0.001&&va.length>=2;
    const sr=document.getElementById(`csr_${shop.id}`);
    if(sr){sr.className="cat-sum-row"+(isBest?" best":"");sr.querySelector(".cat-sum-name").textContent=(isBest?"★ ":"")+shop.label;sr.querySelector(".cat-sum-val").textContent=avg!==null?avg.toFixed(1)+" 円/100g(個)":"―";}
  });
}

function render(){renderBtnRow();renderCatTabs();renderShopRows();renderCatSummary();recompute()}

function renderBtnRow(){
  document.getElementById("btn-row").innerHTML=`
    <button class="btn btn-green"  onclick="addCategory()">＋商品</button>
    <button class="btn btn-orange" onclick="addShop()">＋店舗</button>
    <button class="btn btn-orange" onclick="removeShop()" ${shops.length<=1?"disabled":""}>－店舗</button>
    <button class="btn btn-yellow" onclick="saveData()">💾</button>
    <button class="btn btn-teal"   onclick="exportCSV()">📥</button>
    <button class="btn btn-red"    onclick="resetData()">🗑</button>
    <span class="save-msg" id="save-msg"></span>
    <span id="dirty-msg" style="color:#ff9500;font-size:10px;font-weight:700;display:none">●未保存</span>
  </div>
  <div class="btn-row" id="drive-status-area" style="margin-top:3px"></div>`;
}

function renderCatTabs(){
  const tabs=categories.map(c=>`<button class="cat-tab${activeCatId===c.id?" active":""}" data-id="${c.id}" onclick="selectCat('${c.id}')">${c.label}</button>`).join("");
  document.getElementById("cat-tabs").innerHTML=tabs;
  const editing=editingCatId?categories.find(c=>c.id===editingCatId):null;
  document.getElementById("cat-tab-edit").innerHTML=editing?`
    <div class="cat-tab-edit">
      <input type="text" value="${editing.label}" oninput="renameCategory('${editing.id}',this.value)" placeholder="商品名">
      ${categories.length>1?`<button class="btn btn-red" onclick="removeCategory('${editing.id}')">削除</button>`:""}
      <button class="btn btn-blue" onclick="editingCatId=null;renderCatTabs()">×</button>
    </div>`:"";
}

function selectCat(id){
  if(activeCatId===id){editingCatId=editingCatId===id?null:id;renderCatTabs();if(editingCatId)setTimeout(()=>{const i=document.querySelector('.cat-tab-edit input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}},50);}
  else{activeCatId=id;editingCatId=null;renderCatTabs();renderShopRows();recompute();}
}

function renderShopRows(){
  if(!activeCatId)return;
  const catEntries=entries[activeCatId]||{};
  document.getElementById("shop-rows").innerHTML=shops.map((shop,i)=>{
    const e=catEntries[shop.id]||emptyEntry();
    return`<div class="shop-card" id="sc_${shop.id}">
      <div class="shop-head">
        <div class="shop-num" id="snum_${shop.id}">${i+1}</div>
        <span class="shop-name-label" onclick="startEditShop('${shop.id}')" style="cursor:pointer">${shop.label} ✏️</span>
        <span class="best-badge" id="sbadge_${shop.id}" style="display:none">★ 最安</span>
        <div class="action-mini">
          <button class="act-btn" onclick="openOCR('${activeCatId}','${shop.id}')">📸 OCR</button>
          <button class="act-btn hist" onclick="openHistFromCompare('${activeCatId}','${shop.id}')">🕘</button>
        </div>
      </div>
      <input class="name-inp" type="text" value="${(e.name||"").replace(/"/g,"&quot;")}" placeholder="商品名（任意）" oninput="updateEntry('${activeCatId}','${shop.id}','name',this.value)">
      <div class="field-row">
        <div class="field"><input type="number" inputmode="decimal" value="${e.price||""}" placeholder="価格" oninput="updateEntry('${activeCatId}','${shop.id}','price',this.value)"></div>
        <span class="field-suffix">円</span>
        <div class="field"><input type="number" inputmode="decimal" value="${e.weight||""}" placeholder="g数" oninput="updateEntry('${activeCatId}','${shop.id}','weight',this.value)"></div>
        <span class="field-suffix">g</span>
        <div class="field"><input type="number" inputmode="decimal" value="${e.count||""}" placeholder="個数" oninput="updateEntry('${activeCatId}','${shop.id}','count',this.value)"></div>
        <span class="field-suffix">個</span>
      </div>
      <div id="ur_${shop.id}" style="display:none;gap:6px;margin-top:5px;flex-wrap:wrap">
        <div class="unit-result" id="ur100_${shop.id}" style="display:none;flex:1">
          <span class="unit-label">100gあたり</span>
          <span class="unit-val" id="uv100_${shop.id}">―</span>
        </div>
        <div class="unit-result" id="urItem_${shop.id}" style="display:none;flex:1">
          <span class="unit-label">1個あたり</span>
          <span class="unit-val" id="uvItem_${shop.id}">―</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderCatSummary(){
  document.getElementById("cat-summary").innerHTML=`
    <div class="cat-summary">
      <div class="cat-sum-title">📊 全カテゴリ 平均単価</div>
      ${shops.map(s=>`<div class="cat-sum-row" id="csr_${s.id}"><span class="cat-sum-name">${s.label}</span><span class="cat-sum-val">―</span></div>`).join("")}
    </div>`;
}

function startEditShop(id){
  window._editingShopId=id;
  const shop=shops.find(s=>s.id===id);if(!shop)return;
  document.getElementById("shop-edit-input").value=shop.label;
  document.getElementById("shop-edit-modal").style.display="flex";
  setTimeout(()=>{const inp=document.getElementById("shop-edit-input");if(inp){inp.focus();inp.select()}},50);
}
function applyShopEdit(){
  const id=window._editingShopId;if(!id)return;
  const val=document.getElementById("shop-edit-input").value.trim();
  if(!val){alert("店舗名を入力してください");return}
  const shop=shops.find(s=>s.id===id);if(shop)shop.label=val;
  closeShopEdit();render();
}
function closeShopEdit(){document.getElementById("shop-edit-modal").style.display="none";window._editingShopId=null}

loadData();loadHistory();loadApiKey();render();initGoogleAuth();renderDriveStatus();
</script>
